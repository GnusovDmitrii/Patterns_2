name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      
      - name: Start SUT
        run: |
          java -jar artifacts/app-ibank.jar -P:profile=test &
          sleep 10
          curl -s -o /dev/null -w "%{http_code}\n" http://localhost:9999/ || echo "SUT started"
      
      - name: Run API tests only
        run: gradle test --tests "ApiRegistrationTest"
