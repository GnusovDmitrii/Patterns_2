name: Java CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Check gradlew file
      run: |
        ls -la gradlew || echo "gradlew not found"
        file gradlew || echo "File check"
    
    - name: Fix permissions
      run: |
        if [ -f gradlew ]; then
          chmod +x gradlew
          echo "gradlew permissions fixed"
        else
          echo "gradlew not found, creating wrapper"
          gradle wrapper
          chmod +x gradlew
        fi
    
    - name: Start application
      run: |
        java -jar artifacts/app-ibank.jar -P:profile=test &
        sleep 5
        echo "Application started"
    
    - name: Run tests
      run: ./gradlew test --no-daemon
